[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[context.production.environment]
  VITE_API_URL = "/api"

# API routes go to Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# All other routes go to React app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
